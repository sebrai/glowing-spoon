<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>
<style>
    .red{color: red;}
    table{
        border: solid black 2px;
    }
    td{
        border: solid black 1px;
    }
</style>
<body>
    <table>
        {% for row in table %}
            <tr>
                {% for cell in row %}
                <td class="{% if cell == 1 %} red {% endif %}">{{cell}}</td>
                {% endfor %}
            </tr>
        {% endfor %}
    </table>

</body>

</html>
